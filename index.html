<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Момент истины</title>
  <style>
    :root {
  --mot-bg: #06111f;
  --mot-bg-deep: #030814;
  --mot-panel: rgba(10, 19, 35, 0.74);
  --mot-panel-2: rgba(14, 27, 49, 0.9);
  --mot-panel-solid: #0f1b31;
  --mot-text: #f5fbff;
  --mot-muted: #90a6c3;

  --mot-accent: #59f3b2;
  --mot-accent-2: #49d8ff;
  --mot-accent-3: #ffd76a;

  --mot-danger: #ff5f7a;
  --mot-warning: #ffb84d;
  --mot-correct: #39d98a;
  --mot-wrong: #ff5f7a;

  --mot-border: rgba(125, 211, 252, 0.16);
  --mot-grid: rgba(73, 216, 255, 0.05);
  --mot-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);

  --mot-radius: 18px;

  --mot-scene-top: #0b1d33;
  --mot-scene-mid: #081426;
  --mot-scene-bottom: #050c18;
  --mot-scene-glow-1: rgba(22,126,173,0.16);
  --mot-scene-glow-2: rgba(21,74,112,0.10);
  --mot-scene-aurora-1: rgba(63,143,198,0.14);
  --mot-scene-aurora-2: rgba(63,143,198,0.10);
  --mot-scene-aurora-3: rgba(30,126,148,0.10);
  --mot-grid-line: rgba(73,216,255,0.035);

  --mot-panel-top: rgba(10,19,34,0.90);
  --mot-panel-bottom: rgba(5,10,20,0.94);
  --mot-panel-glow: rgba(92,154,196,0.04);
  --mot-panel-border: rgba(96,140,180,0.10);
  --mot-intro-overlay-top: rgba(2,6,16,0.62);
  --mot-intro-overlay-bottom: rgba(2,6,16,0.78);
  --mot-intro-card-top: rgba(10,19,34,0.96);
  --mot-intro-card-bottom: rgba(6,11,21,0.98);
  --mot-intro-card-border: rgba(122,176,219,0.18);

  --mot-font-body: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
  --mot-font-display: "Segoe UI Variable Display", "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
  --mot-font-tech: "Bahnschrift", "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
  --mot-font-ui: var(--mot-font-body);
  --mot-font-hud-label: var(--mot-font-tech);
  --mot-font-hud-value: var(--mot-font-display);
  --mot-font-question: var(--mot-font-display);
  --mot-font-button: var(--mot-font-tech);
  --mot-font-feedback: var(--mot-font-ui);
  --mot-font: var(--mot-font-ui);
  --mot-title-font: var(--mot-font-question);

  --mot-answer-font-size: clamp(14px, 2vw, 18px);
  --mot-question-font-size: clamp(18px, 2.2vw, 28px);
  --mot-hud-font-size: clamp(12px, 1.3vw, 14px);

  --mot-indicator-size: 34px;
  --mot-rail-height: 18px;
  --mot-band-height: 92px;
  --mot-shell-gap: 14px;
  --mot-shell-padding: 18px;
  --mot-track-height: 42px;
  --mot-main-gap: 16px;
  --mot-main-padding: 18px;
  --mot-question-height: 132px;
  --mot-question-min-height: 112px;
  --mot-rail-frame-height: 84px;
  --mot-answer-wrap-bottom: 14px;
  --mot-answer-band-min-height: 148px;
  --mot-answer-cell-min-height: 120px;
  --mot-answer-cell-font-size: clamp(20px, 2.3vw, 30px);
  --mot-controls-min-height: 56px;
  --mot-btn-min-height: 48px;
  --mot-feedback-height: 58px;
  --mot-timer-pill-height: 42px;

  --mot-anim-fast: 160ms;
  --mot-anim-mid: 280ms;
  --mot-anim-slow: 500ms;
}


    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: var(--mot-font-ui);
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

.mot-root {
  width: 100vw;
  height: 100vh;
  max-width: 100vw;
  max-height: 100vh;
  color: var(--mot-text);
  background:
    radial-gradient(circle at 50% 100%, var(--mot-scene-glow-1), transparent 28%),
    radial-gradient(circle at 50% 30%, var(--mot-scene-glow-2), transparent 26%),
    linear-gradient(180deg, var(--mot-scene-top) 0%, var(--mot-scene-mid) 42%, var(--mot-scene-bottom) 100%);
  overflow: hidden;
  position: relative;
  isolation: isolate;
}


.mot-root::before {
  content: "";
  position: absolute;
  inset: -8%;
  background:
    radial-gradient(circle at 14% 18%, var(--mot-scene-aurora-1), transparent 16%),
    radial-gradient(circle at 84% 18%, var(--mot-scene-aurora-2), transparent 16%),
    radial-gradient(circle at 50% 76%, var(--mot-scene-aurora-3), transparent 24%);
  filter: blur(54px);
  opacity: 0.78;
  animation: motAuroraDrift 18s ease-in-out infinite alternate;
  pointer-events: none;
}


.mot-root::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--mot-grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--mot-grid-line) 1px, transparent 1px);
  background-size: 56px 56px;
  opacity: 0.16;
  pointer-events: none;
}


@keyframes motAuroraDrift {
  0% {
    transform: translate3d(-2%, 0, 0) scale(1);
  }
  50% {
    transform: translate3d(2%, -1%, 0) scale(1.04);
  }
  100% {
    transform: translate3d(0, 2%, 0) scale(1.08);
  }
}


    .mot-shell {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: var(--mot-shell-gap);
      padding: var(--mot-shell-padding);
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

.mot-panel {
  position: relative;
  min-height: 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, var(--mot-panel-top), var(--mot-panel-bottom)),
    radial-gradient(circle at 50% 0%, var(--mot-panel-glow), transparent 56%);
  border: 1px solid var(--mot-panel-border);
  border-radius: var(--mot-radius);
  box-shadow:
    0 18px 40px rgba(0, 0, 0, 0.24),
    inset 0 1px 0 rgba(255,255,255,0.03),
    inset 0 -1px 0 rgba(73,216,255,0.02);
  backdrop-filter: blur(14px) saturate(130%);
}

.mot-panel::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 1px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(73,216,255,0.24),
    rgba(89,243,178,0.16),
    transparent
  );
  opacity: 0.42;
  pointer-events: none;
}


    .mot-hud {
      position: relative;
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
      font-size: var(--mot-hud-font-size);
      flex-shrink: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        radial-gradient(circle at 50% -90%, rgba(73,216,255,0.04), transparent 54%);
    }

    .mot-hud::after {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 0;
      height: 18px;
      background: radial-gradient(circle at 50% 50%, rgba(73,216,255,0.06), transparent 74%);
      filter: blur(14px);
      opacity: 0.6;
      pointer-events: none;
    }

    .mot-stat {
      position: relative;
      isolation: isolate;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px 12px 12px;
      min-width: 0;
      min-height: 72px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01)),
        linear-gradient(180deg, rgba(16,28,48,0.88), rgba(8,14,26,0.94));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        inset 0 -1px 0 rgba(0,0,0,0.18),
        0 8px 16px rgba(0,0,0,0.10);
      transition: transform var(--mot-anim-fast) ease, border-color var(--mot-anim-fast) ease, box-shadow var(--mot-anim-fast) ease, background var(--mot-anim-fast) ease;
    }

    .mot-stat::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035), transparent 34%),
        radial-gradient(circle at 18% 0%, rgba(255,255,255,0.04), transparent 24%);
      pointer-events: none;
    }

    .mot-stat::after {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      opacity: 0.46;
      pointer-events: none;
    }

    .mot-stat--highlight {
      border-color: rgba(56,189,248,0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 0 1px rgba(56,189,248,0.08),
        0 10px 24px rgba(0,0,0,0.14),
        0 0 16px rgba(56,189,248,0.08);
    }

    .mot-stat--danger {
      border-color: rgba(239,68,68,0.45);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
        linear-gradient(135deg, rgba(88,30,46,0.82), rgba(39,13,23,0.82));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 0 0 1px rgba(239,68,68,0.10),
        0 0 18px rgba(239,68,68,0.10);
      animation: motDangerPulse 1.2s ease-in-out infinite;
    }

    @keyframes motDangerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .mot-stat__label {
      position: relative;
      z-index: 1;
      font-family: var(--mot-font-hud-label);
      color: #8ca4bf;
      font-size: 10px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .mot-stat__value {
      position: relative;
      z-index: 1;
      font-family: var(--mot-font-hud-value);
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: none;
      font-variant-numeric: tabular-nums lining-nums;
    }

    .mot-stat--combo {
      background:
        radial-gradient(circle at 50% -24%, rgba(73,216,255,0.12), transparent 54%),
        linear-gradient(180deg, rgba(18,34,58,0.92), rgba(8,17,31,0.94));
      border-color: rgba(73,216,255,0.14);
    }

    .mot-stat--progress {
      background:
        radial-gradient(circle at 50% -22%, rgba(116,178,255,0.10), transparent 54%),
        linear-gradient(180deg, rgba(18,31,52,0.90), rgba(8,16,29,0.94));
      border-color: rgba(120,188,255,0.12);
    }

    .mot-stat--score {
      background:
        radial-gradient(circle at 50% -18%, rgba(255,215,106,0.10), transparent 54%),
        linear-gradient(180deg, rgba(34,30,23,0.86), rgba(10,18,31,0.94));
      border-color: rgba(255,215,106,0.12);
    }

    .mot-stat--score .mot-stat__value {
      color: #fff3cb;
    }

    .mot-stat--lives {
      background:
        radial-gradient(circle at 50% -16%, rgba(255,95,122,0.10), transparent 56%),
        linear-gradient(180deg, rgba(39,24,32,0.88), rgba(10,18,31,0.94));
      border-color: rgba(255,95,122,0.12);
    }

    .mot-stat--lives .mot-stat__value {
      color: #fff3f6;
      letter-spacing: 0.06em;
    }

    .mot-stat--goal {
      background:
        radial-gradient(circle at 50% -18%, rgba(89,243,178,0.10), transparent 56%),
        linear-gradient(180deg, rgba(17,39,38,0.86), rgba(9,18,31,0.94));
      border-color: rgba(89,243,178,0.12);
    }

    .mot-stat--progress .mot-stat__value,
    .mot-stat--goal .mot-stat__value,
    .mot-stat--combo .mot-stat__value {
      font-size: 18px;
    }

    .mot-stat--score::after,
    .mot-stat--combo::after,
    .mot-stat--lives::after,
    .mot-stat--goal::after {
      opacity: 0.72;
    }

    .mot-stat--score::after {
      background: linear-gradient(90deg, transparent, rgba(255,215,106,0.20), transparent);
    }

    .mot-stat--combo::after {
      background: linear-gradient(90deg, transparent, rgba(73,216,255,0.20), transparent);
    }

    .mot-stat--lives::after {
      background: linear-gradient(90deg, transparent, rgba(255,95,122,0.20), transparent);
    }

    .mot-stat--goal::after {
      background: linear-gradient(90deg, transparent, rgba(89,243,178,0.20), transparent);
    }

    .mot-score-counting {
      color: #fde68a;
      text-shadow: 0 0 14px rgba(245,158,11,0.24);
    }

    .mot-progress {
      padding: 12px 16px 14px;
      flex-shrink: 0;
      background:
        linear-gradient(180deg, rgba(9,18,31,0.88), rgba(7,14,26,0.92)),
        radial-gradient(circle at 50% 0%, rgba(73,216,255,0.04), transparent 58%);
    }
    .mot-progress__header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .mot-progress__title {
      font-family: var(--mot-font-hud-label);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #e6f4ff;
    }
    .mot-progress__meta {
      font-family: var(--mot-font-ui);
      color: var(--mot-muted);
      font-size: 12px;
      max-width: 42ch;
      text-align: right;
    }

    .mot-track {
      position: relative;
      height: var(--mot-track-height);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        linear-gradient(90deg, #101a2b, #172234);
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .mot-track__fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(34,197,94,0.45), rgba(56,189,248,0.45));
      transition: width var(--mot-anim-slow) ease;
      z-index: 1;
    }
    .mot-track__ticks {
      position: absolute;
      inset: 0;
      display: grid;
      z-index: 2;
      pointer-events: none;
    }
    .mot-track__tick { border-right: 1px solid rgba(255,255,255,0.06); }
    .mot-track__tick:last-child { border-right: none; }
    .mot-track__runner {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      padding: 0;
      line-height: 1;
      transition: left var(--mot-anim-slow) ease;
      pointer-events: none;
      z-index: 4;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.30));
    }
    .mot-track__runner::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(18,33,56,0.98), rgba(9,17,30,1));
      border: 1px solid rgba(118,174,217,0.20);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 10px 18px rgba(0,0,0,0.18);
      transform: rotate(45deg);
    }
    .mot-track__runner::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 12px;
      background:
        radial-gradient(circle, rgba(245,251,255,0.96) 0 26%, rgba(73,216,255,0.92) 27% 60%, rgba(73,216,255,0.14) 61% 100%);
      box-shadow:
        0 0 0 1px rgba(73,216,255,0.22),
        0 0 18px rgba(73,216,255,0.28);
      transform: rotate(45deg);
    }
    .mot-track__runner-badge {
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(15,28,47,0.96), rgba(9,16,29,0.98));
      border: 1px solid rgba(118,174,217,0.16);
      color: #cfe3f3;
      font-family: var(--mot-font-hud-label);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 8px 16px rgba(0,0,0,0.18);
    }
    .mot-track__runner--image::before,
    .mot-track__runner--image::after {
      display: none;
    }
    .mot-track__runner--image {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background:
        linear-gradient(180deg, rgba(15,28,47,0.96), rgba(9,16,29,0.98));
      border: 1px solid rgba(118,174,217,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 10px 18px rgba(0,0,0,0.22);
      overflow: hidden;
    }
    .mot-track__runner--image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }
    .mot-track__finish {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 0 12px 0 10px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(16,28,47,0.96), rgba(9,16,29,0.98)),
        radial-gradient(circle at 0% 50%, rgba(73,216,255,0.10), transparent 42%);
      border: 1px solid rgba(118,174,217,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 8px 18px rgba(0,0,0,0.20);
      color: #d8ebf8;
      font-family: var(--mot-font-hud-label);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .mot-track__finish::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(245,251,255,0.95) 0 34%, rgba(73,216,255,0.92) 35% 62%, rgba(73,216,255,0.12) 63% 100%);
      box-shadow:
        0 0 0 1px rgba(73,216,255,0.18),
        0 0 14px rgba(73,216,255,0.24);
      flex: 0 0 auto;
    }
    .mot-track__finish::after {
      content: "";
      position: absolute;
      left: -8px;
      top: 50%;
      width: 2px;
      height: 24px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(245,251,255,0.18), rgba(73,216,255,0.82), rgba(245,251,255,0.18));
      box-shadow: 0 0 12px rgba(73,216,255,0.26);
    }

.mot-main {
  position: relative;
  display: grid;
  grid-template-rows: auto auto auto auto auto;
  gap: var(--mot-main-gap);
  padding: var(--mot-main-padding);
  min-height: 0;
  height: 100%;
  overflow: hidden;
  align-content: start;
  border-radius: calc(var(--mot-radius) + 8px);
  background:
    radial-gradient(circle at 50% 14%, rgba(73,216,255,0.08), transparent 20%),
    radial-gradient(circle at 50% 56%, rgba(73,216,255,0.06), transparent 18%),
    radial-gradient(circle at 50% 72%, rgba(89,243,178,0.06), transparent 30%),
    linear-gradient(180deg, rgba(8,17,31,0.92), rgba(4,10,20,0.98));
  border: 1px solid rgba(89, 150, 206, 0.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    inset 0 0 56px rgba(73,216,255,0.02),
    inset 0 -30px 80px rgba(0,0,0,0.24),
    0 22px 46px rgba(0,0,0,0.26);
  transition:
    transform var(--mot-anim-mid) ease,
    box-shadow var(--mot-anim-mid) ease,
    border-color var(--mot-anim-mid) ease;
}

.mot-main::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(73,216,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(73,216,255,0.02) 1px, transparent 1px);
  background-size: 64px 64px;
  opacity: 0.22;
  pointer-events: none;
}

.mot-main::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 20%;
  width: min(64%, 760px);
  height: 62%;
  transform: translateX(-50%);
  background:
    radial-gradient(circle at 50% 20%, rgba(73,216,255,0.16), transparent 22%),
    radial-gradient(circle at 50% 54%, rgba(73,216,255,0.08), transparent 22%),
    radial-gradient(circle at 50% 78%, rgba(89,243,178,0.08), transparent 28%);
  filter: blur(42px);
  opacity: 0.58;
  animation: motStagePulse 7.2s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes motStagePulse {
  0% {
    transform: translateX(-50%) scale(0.96);
    opacity: 0.62;
  }
  50% {
    transform: translateX(-50%) scale(1.02);
    opacity: 0.88;
  }
  100% {
    transform: translateX(-50%) scale(1.05);
    opacity: 0.74;
  }
}


.mot-question {
  position: relative;
  width: min(100%, 1320px);
  margin-inline: auto;
  padding: 18px 90px 18px 24px;
  line-height: 1.35;
  font-size: var(--mot-question-font-size);
  font-weight: 800;
  text-align: center;
  min-height: var(--mot-question-min-height);

      function collectThemeVarNames(map, output = []) {
        Object.values(map).forEach((value) => {
          if (typeof value === 'string') output.push(value);
          else if (value && typeof value === 'object') collectThemeVarNames(value, output);
        });
        return output;
      }

      function mapThemeToCssVars(themeSection, map, output = {}) {
        if (!themeSection || !map) return output;
        Object.keys(map).forEach((key) => {
          const mapValue = map[key];
          const themeValue = themeSection[key];
          if (typeof mapValue === 'string') {
            if (themeValue !== undefined && themeValue !== null && themeValue !== '') output[mapValue] = String(themeValue);
            return;
          }
          if (mapValue && typeof mapValue === 'object') mapThemeToCssVars(themeValue || {}, mapValue, output);
        });
        return output;
      }

      const THEME_VAR_NAMES = collectThemeVarNames(THEME_VAR_MAP);

      function deepMerge(target, source) {
        const output = Array.isArray(target) ? target.slice() : { ...target };
        if (!source || typeof source !== 'object') return output;
        Object.keys(source).forEach((key) => {
          const value = source[key];
          if (Array.isArray(value)) output[key] = value.slice();
          else if (value && typeof value === 'object') {
            output[key] = deepMerge(output[key] && typeof output[key] === 'object' ? output[key] : {}, value);
          } else output[key] = value;
        });
        return output;
      }
      const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
      const percent = (value, total) => total ? Math.round((value / total) * 100) : 0;
      const randomFrom = (arr) => arr[Math.floor(Math.random() * arr.length)];
      const truncateText = (text, maxLength) => typeof text !== 'string' ? '' : (text.length > maxLength ? text.slice(0, maxLength - 1) + '…' : text);

      function validateQuestions(questions, maxAnswerLength) {
        if (!Array.isArray(questions) || !questions.length) throw new Error('Questions array is empty.');
        questions.forEach((q, index) => {
          if (!q || typeof q !== 'object') throw new Error(`Question at index ${index} is invalid.`);
          if (!Array.isArray(q.answers) || q.answers.length < 3 || q.answers.length > 5) throw new Error(`Question "${q.id || index}" must contain 3..5 answers.`);
          if (typeof q.correct_index !== 'number' || q.correct_index < 0 || q.correct_index >= q.answers.length) throw new Error(`Question "${q.id || index}" has invalid correct_index.`);
          q.answers.forEach((answer, answerIndex) => {
            if (String(answer).length > maxAnswerLength) throw new Error(`Answer ${answerIndex} in "${q.id || index}" exceeds maxAnswerLength (${maxAnswerLength}).`);
          });
        });
      }

      function createAudioManager(configRef) {
        let ctx = null;
        let freezeLoopNodes = null;
        let freezeLfoNodes = null;
        let scoreTickTimer = null;

        function ensureContext() {
          if (!configRef.audio.enabled) return null;
          if (!ctx) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            ctx = new AudioContextClass();
          }
          if (ctx.state === 'suspended') ctx.resume().catch(() => {});
          return ctx;
        }

        function playTone(options = {}) {
          const audioCtx = ensureContext();
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const now = audioCtx.currentTime;
          const filter = audioCtx.createBiquadFilter();
          const baseVolume = Number(configRef.audio.volume || 0.05);
          const frequency = Number(options.freq || 440);
          const endFrequency = Number(options.endFreq || frequency);
          const duration = Math.max(Number(options.duration || 0.12), 0.03);
          const attack = clamp(Number(options.attack ?? 0.008), 0.001, 0.08);
          const releaseStart = clamp(Number(options.releaseStart ?? duration * 0.35), attack, duration);
          const volume = clamp(baseVolume * Number(options.volumeMultiplier || 1), 0, 1);
          osc.type = options.type || 'sine';
          osc.frequency.setValueAtTime(frequency, now);
          if (endFrequency !== frequency) osc.frequency.exponentialRampToValueAtTime(Math.max(endFrequency, 1), now + duration);
          filter.type = options.filterType || 'lowpass';
          filter.frequency.setValueAtTime(Number(options.filterFreq || 2200), now);
          filter.Q.setValueAtTime(Number(options.filterQ || 0.0001), now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(Math.max(volume, 0.0001), now + attack);
          gain.gain.exponentialRampToValueAtTime(Math.max(volume * 0.58, 0.0001), now + releaseStart);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
          osc.connect(filter);
          filter.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.02);
        }

        function playSequence(tones = []) {
          tones.forEach((tone) => {
            const delay = Number(tone.delay || 0);
            setTimeout(() => playTone(tone), delay);
          });
        }

        function startFreezeLoop() {
          const audioCtx = ensureContext();
          if (!audioCtx || freezeLoopNodes) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const filter = audioCtx.createBiquadFilter();
          const lfo = audioCtx.createOscillator();
          const lfoGain = audioCtx.createGain();
          const now = audioCtx.currentTime;
          const baseVolume = clamp(Number(configRef.audio.volume || 0.05) * 0.12, 0, 0.05);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(330, now);
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(1400, now);
          filter.Q.setValueAtTime(1.2, now);
          lfo.type = 'sine';
          lfo.frequency.setValueAtTime(2.2, now);
          lfoGain.gain.setValueAtTime(0.015, now);
          lfo.connect(lfoGain);
          lfoGain.connect(gain.gain);
          gain.gain.setValueAtTime(baseVolume, now);
          osc.connect(filter);
          filter.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          lfo.start(now);
          freezeLoopNodes = { osc, gain, filter };
          freezeLfoNodes = { lfo, lfoGain };
        }

        function stopFreezeLoop() {
          if (!ctx || !freezeLoopNodes) return;
          const now = ctx.currentTime;
          try {
            freezeLoopNodes.gain.gain.cancelScheduledValues(now);
            freezeLoopNodes.gain.gain.setValueAtTime(freezeLoopNodes.gain.gain.value || 0.01, now);
            freezeLoopNodes.gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
            freezeLoopNodes.osc.stop(now + 0.1);
            freezeLfoNodes.lfo.stop(now + 0.1);
          } catch (e) {}
          freezeLoopNodes = null;
          freezeLfoNodes = null;

            ]);
          },

            playSequence([

      }

      function createGame() {
        let rootEl = null;
        let config = deepMerge({}, DEFAULT_CONFIG);
        let questions = DEFAULT_QUESTIONS.slice();
        let rafId = 0;
        let lastTs = 0;
        let roundTimeout = null;
        let freezeInterval = null;
        let resizeObserver = null;
        let audio = createAudioManager(config);
        let scoreAnimFrame = 0;

        const state = {
          status: 'idle',
          currentQuestionIndex: 0,
          lives: 3,
          correctAnswers: 0,
          wrongAnswers: 0,
          combo: 0,
          bestCombo: 0,
          perfectAnswers: 0,
          perfectStreak: 0,
          progressStep: 0,
          stepsToFinish: 5,
          accuracy: 0,
          score: 0,
          displayedScore: 0,
          scoreAnimating: false,
          energy: 0,
          achievementsUnlocked: [],
          usedFreezeAnyTime: false,
          indicator: {
            position: 0,
            direction: 1,
            speed: 300,
            movementType: 'pingpong'
          },
          bonuses: {
            freezeActive: false,
            freezeRemainingMs: 0,
            freezeResumeStatus: null
          },
          currentRound: {
            selectedIndex: null,
            correctIndex: null,
            result: null,
            bannerText: '',
            stopAvailableAt: 0,
            hiddenIndices: [],
            visibleIndices: [],
            questionId: null,
            isPerfect: false,
            awardedScore: 0,
            mode: 'normal',
            stepGain: 1,
            energyGain: 0
          }
        };

        const dom = {};
        function emit(eventName, detail) { if (rootEl) rootEl.dispatchEvent(new CustomEvent(eventName, { detail })); }

        function applyThemeConfig() {
          if (!rootEl) return;
          THEME_VAR_NAMES.forEach((varName) => rootEl.style.removeProperty(varName));
          const themeVars = mapThemeToCssVars(config.theme || {}, THEME_VAR_MAP);
          Object.entries(themeVars).forEach(([varName, value]) => {
            rootEl.style.setProperty(varName, value);
          });
        }

        function destroyTimers() {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = 0;
          if (scoreAnimFrame) cancelAnimationFrame(scoreAnimFrame);
          scoreAnimFrame = 0;
          if (roundTimeout) clearTimeout(roundTimeout);
          roundTimeout = null;
          if (freezeInterval) clearInterval(freezeInterval);
          freezeInterval = null;
          if (dom.inlineToastTimer) clearTimeout(dom.inlineToastTimer);
          if (dom.inlineToast) dom.inlineToast.className = 'mot-inline-toast';
          if (dom.inlineToastTitle) dom.inlineToastTitle.textContent = '';
          if (dom.inlineToastText) dom.inlineToastText.textContent = '';
          dom.inlineToastTimer = null;
          audio.freezeStop();
          lastTs = 0;
        }

        const getCurrentQuestion = () => questions[state.currentQuestionIndex];
        const getTotalAnswered = () => state.correctAnswers + state.wrongAnswers;
        function updateAccuracy() {
          state.accuracy = getTotalAnswered() > 0 ? Math.round((state.correctAnswers / getTotalAnswered()) * 100) : 0;
        }

        function getLifeIcons() {
          const maxLives = config.gameplay.lives;
          const currentLives = state.lives;
          let out = '';
          const icon = config.ui.lifeDisplay === 'hearts' ? '♥' : '●';
          for (let i = 0; i < maxLives; i++) {
            out += i < currentLives ? icon : '♡';
            if (i < maxLives - 1) out += ' ';
          }
          return out;
        }

        function getComboMessage(combo) {
          if (config.messages.combo[combo]) return config.messages.combo[combo];
          if (combo >= 5) return config.messages.combo[5];
          if (combo >= 3) return config.messages.combo[3];
          if (combo >= 2) return config.messages.combo[2];
          return '';
        }

        function questionModeClass(mode) {
          if (mode === 'boss') return 'mot-question--boss';
          if (mode === 'speed') return 'mot-question--speed';
          if (mode === 'safe') return 'mot-question--safe';
          if (mode === 'double_step') return 'mot-question--double';
          return '';
        }

        function getBonusAvailable(type) {
          const energy = state.energy;
          if (type === 'freeze') return energy >= Number(config.bonuses.freezeCost || 100);
          if (type === 'fifty') return energy >= Number(config.bonuses.fiftyCost || 60);
          return false;
        }

        function spendEnergy(amount) {
          state.energy = clamp(state.energy - amount, 0, Number(config.bonuses.energyMax || 100));
        }

        function gainEnergy(amount) {
          state.energy = clamp(state.energy + amount, 0, Number(config.bonuses.energyMax || 100));
        }

        function animateScoreTo(target, durationMs = 800) {
          if (scoreAnimFrame) cancelAnimationFrame(scoreAnimFrame);
          const start = state.displayedScore;
          const diff = target - start;
          const startTime = performance.now();
          state.scoreAnimating = true;
          audio.scoreCount(durationMs);
          function frame(now) {
            const progress = clamp((now - startTime) / durationMs, 0, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            state.displayedScore = Math.round(start + diff * eased);
            render();
            if (progress < 1) scoreAnimFrame = requestAnimationFrame(frame);
            else {
              state.displayedScore = target;
              state.scoreAnimating = false;
              scoreAnimFrame = 0;
              render();
            }
          }
          scoreAnimFrame = requestAnimationFrame(frame);
        }

        function showToast(title, text, type = 'achievement') {
          if (!dom.inlineToast) return;
          if (dom.inlineToastTimer) clearTimeout(dom.inlineToastTimer);
          dom.inlineToast.className = `mot-inline-toast mot-inline-toast--${type} mot-inline-toast--visible`;
          dom.inlineToastTitle.textContent = title;
          dom.inlineToastText.textContent = text;
          dom.inlineToastTimer = setTimeout(() => {
            dom.inlineToast.className = 'mot-inline-toast';
            dom.inlineToastTitle.textContent = '';
            dom.inlineToastText.textContent = '';
            dom.inlineToastTimer = null;
          }, 2200);
        }

        function triggerPerfectBurst() {
          dom.perfectBurst.classList.remove('mot-perfect-burst--show');
          void dom.perfectBurst.offsetWidth;
          dom.perfectBurst.textContent = config.perfect.text || 'ИДЕАЛ!';
          dom.perfectBurst.classList.add('mot-perfect-burst--show');
        }

        function triggerShake() {
          dom.mainPanel.classList.remove('mot-shake');
          void dom.mainPanel.offsetWidth;
          dom.mainPanel.classList.add('mot-shake');
        }

        function maybeUnlockAchievement(code) {
          if (!config.achievements.enabled) return;
          const found = (config.achievements.list || []).find((item) => item.check === code);
          if (!found) return;
          if (state.achievementsUnlocked.includes(found.id)) return;
          state.achievementsUnlocked.push(found.id);
          audio.achievement();
          showToast(found.title, found.text, 'achievement');
        }

        function checkAchievementsOnCorrect() {
          if (state.combo >= 3) maybeUnlockAchievement('combo3');
          if (state.combo >= 5) maybeUnlockAchievement('combo5');
          if (state.perfectStreak >= 3) maybeUnlockAchievement('perfect3');
        }

        function checkAchievementsOnWin() {
          if (state.lives <= 1) maybeUnlockAchievement('survivor');
          if (!state.usedFreezeAnyTime) maybeUnlockAchievement('cool');
        }

        function spawnConfetti(count = 80) {
          if (!dom.confettiLayer) return;
          dom.confettiLayer.innerHTML = '';
          const colors = ['#22c55e', '#38bdf8', '#f59e0b', '#ef4444', '#a78bfa', '#fde68a'];
          for (let i = 0; i < count; i++) {
            const piece = document.createElement('div');
            piece.className = 'mot-confetti';
            piece.style.left = `${Math.random() * 100}%`;
            piece.style.background = colors[i % colors.length];
            piece.style.animationDuration = `${3.2 + Math.random() * 2.2}s`;
            piece.style.animationDelay = `${Math.random() * 0.35}s`;
            piece.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
            dom.confettiLayer.appendChild(piece);
          }
        }

        function render() {
          if (!rootEl) return;
          rootEl.dataset.state = state.status;
          updateAccuracy();
          const question = getCurrentQuestion();
          const answers = question ? question.answers : [];
          const segments = answers.length || 1;
          const segmentColumns = `repeat(${segments}, minmax(0, 1fr))`;

          dom.currentQuestionIndex.textContent = String(state.currentQuestionIndex + 1);
          dom.questionsTotal.textContent = String(questions.length);
          dom.combo.textContent = `x${state.combo}`;
          dom.bestCombo.textContent = `x${state.bestCombo}`;
          dom.accuracy.textContent = `${state.accuracy}%`;
          dom.lives.textContent = getLifeIcons();
          dom.score.textContent = String(state.displayedScore);
          dom.status.textContent = state.status;
          dom.goal.textContent = String(config.gameplay.stepsToFinish);
          dom.perfectCount.textContent = String(state.perfectAnswers);
          dom.questionText.textContent = question ? question.question : '—';
          dom.questionBox.className = `mot-panel mot-question ${questionModeClass(question && question.mode)}`.trim();
          dom.scoreStat.classList.toggle('mot-stat--highlight', state.combo >= 3 || state.scoreAnimating);
          dom.score.classList.toggle('mot-score-counting', state.scoreAnimating);
          dom.lifeStat.classList.toggle('mot-stat--danger', state.lives <= Number(config.gameplay.lastChanceLivesThreshold || 1));

          dom.stopButton.disabled = !(
            state.status === 'indicator_moving' && performance.now() >= state.currentRound.stopAvailableAt && !state.bonuses.freezeActive
          );
          dom.freezeButton.disabled = !(state.status === 'indicator_moving' && getBonusAvailable('freeze'));
          dom.fiftyButton.disabled = !(state.status === 'indicator_moving' && getBonusAvailable('fifty'));
          dom.freezeButton.classList.toggle('mot-btn--bonus-ready', getBonusAvailable('freeze'));
          dom.freezeButton.classList.toggle('mot-btn--freeze-active', state.bonuses.freezeActive);
          dom.fiftyButton.classList.toggle('mot-btn--bonus-ready', getBonusAvailable('fifty'));
          dom.freezeButton.textContent = state.bonuses.freezeActive ? 'Стоп-кадр активен' : `Стоп-кадр (${config.bonuses.freezeCost})`;
          dom.fiftyButton.textContent = `50/50 (${config.bonuses.fiftyCost})`;

          const timerVisible = state.bonuses.freezeActive;
          dom.timerPill.classList.toggle('mot-timer__pill--visible', timerVisible);
          dom.timerValue.textContent = timerVisible ? `${Math.ceil(state.bonuses.freezeRemainingMs / 1000)} c` : '';

          const energyMax = Number(config.bonuses.energyMax || 100);
          dom.energyValue.textContent = `${state.energy}/${energyMax}`;
          dom.energyFill.style.width = `${percent(state.energy, energyMax)}%`;

          dom.railSegments.style.gridTemplateColumns = segmentColumns;
          dom.answerBand.style.gridTemplateColumns = segmentColumns;
          dom.rail.classList.toggle('mot-rail--hide-borders', !config.ui.showSegmentBorders);
          dom.answerBand.classList.toggle('mot-answer-band--hide-borders', !config.ui.showSegmentBorders);
          dom.railSegments.innerHTML = '';
          dom.answerBand.innerHTML = '';

          answers.forEach((answer, index) => {
            const segmentEl = document.createElement('div');
            segmentEl.className = 'mot-rail__segment';
            if (state.currentRound.result === 'correct' && index === state.currentRound.correctIndex) segmentEl.classList.add('mot-rail__segment--correct');
            if (state.currentRound.result === 'wrong') {
              if (index === state.currentRound.correctIndex) segmentEl.classList.add('mot-rail__segment--correct');
              if (index === state.currentRound.selectedIndex) segmentEl.classList.add('mot-rail__segment--wrong');
            }
            dom.railSegments.appendChild(segmentEl);

            const cellEl = document.createElement('div');
            cellEl.className = 'mot-answer-band__cell';
            cellEl.textContent = truncateText(String(answer), config.gameplay.maxAnswerLength);
            if (state.currentRound.hiddenIndices.includes(index)) cellEl.classList.add('mot-answer-band__cell--hidden');
            if (state.currentRound.result === 'correct' && index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--correct');
            if (state.currentRound.result === 'wrong') {
              if (index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--correct');
              if (index === state.currentRound.selectedIndex) cellEl.classList.add('mot-answer-band__cell--wrong');
            }
            if (state.currentRound.isPerfect && index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--perfect');
            dom.answerBand.appendChild(cellEl);
          });

          renderProgressTrack();
          renderIndicator();
          renderBanner();
          renderStartScreen();
          renderFinalScreen();
        }

        function renderProgressTrack() {
          dom.trackFill.style.width = `${percent(state.progressStep, state.stepsToFinish)}%`;
          dom.trackTicks.innerHTML = '';
          dom.trackTicks.style.gridTemplateColumns = `repeat(${state.stepsToFinish}, minmax(0, 1fr))`;
          for (let i = 0; i < state.stepsToFinish; i++) {
            const tick = document.createElement('div');
            tick.className = 'mot-track__tick';
            dom.trackTicks.appendChild(tick);
          }
          const progressRatio = clamp(state.progressStep / state.stepsToFinish, 0, 1);
          dom.trackRunner.style.left = `${progressRatio * 100}%`;
          if (config.progress.playerTokenImage) {
            dom.trackRunner.classList.add('mot-track__runner--image');
            dom.trackRunner.innerHTML = `<img src="${config.progress.playerTokenImage}" alt="Маркер игрока">`;
          } else {
            dom.trackRunner.classList.remove('mot-track__runner--image');
            dom.trackRunner.innerHTML = '';
            dom.trackRunner.setAttribute('aria-label', config.progress.playerLabel || 'Маркер игрока');
          }
          dom.trackFinish.textContent = config.progress.finishLabel || config.progress.finishIcon || 'Финиш';
        }

function renderIndicator() {
  const railRect = dom.rail.getBoundingClientRect();
  const width = railRect.width || dom.rail.clientWidth || 1;
  const x = clamp(state.indicator.position * width, 0, width);
  dom.indicator.style.left = `${x}px`;
  dom.indicator.classList.toggle('mot-indicator--frozen', state.bonuses.freezeActive);
  dom.indicator.classList.toggle('mot-indicator--moving', state.status === 'indicator_moving' && !state.bonuses.freezeActive);
}


        function renderBanner() {
          dom.banner.className = 'mot-banner';
          if (state.status === 'question_ready' || state.status === 'indicator_moving') {
            dom.banner.classList.add('mot-banner--info');
            if (state.lives <= Number(config.gameplay.lastChanceLivesThreshold || 1)) {
              dom.banner.textContent = config.messages.lastChance || 'Последний шанс!';
              return;
            }
            if (state.bonuses.freezeActive) {
              dom.banner.textContent = 'Стоп-кадр активен. Следи за таймером бонуса.';
              return;
            }
            const comboMessage = getComboMessage(state.combo);
            const energyHint = getBonusAvailable('freeze') || getBonusAvailable('fifty') ? ' Бонус готов.' : '';
            dom.banner.textContent = (comboMessage || 'Останови индикатор в секторе правильного ответа.') + energyHint;
            return;
          }
          if (state.currentRound.isPerfect && state.currentRound.result === 'correct') {
            dom.banner.classList.add('mot-banner--perfect');
            dom.banner.textContent = state.currentRound.bannerText || `${randomFrom(config.messages.perfect)} +${state.currentRound.awardedScore}`;
            return;
          }
          if (state.currentRound.result === 'correct') {
            dom.banner.classList.add('mot-banner--correct');
            const comboMessage = getComboMessage(state.combo);
            dom.banner.textContent = state.currentRound.bannerText || `${comboMessage || randomFrom(config.messages.correct)} +${state.currentRound.awardedScore}`;
            return;
          }
          if (state.currentRound.result === 'wrong') {
            dom.banner.classList.add('mot-banner--wrong');
            dom.banner.textContent = state.currentRound.bannerText || randomFrom(config.messages.wrong);
            return;
          }
          dom.banner.classList.add('mot-banner--info');
          dom.banner.textContent = 'Система готова к следующему вопросу.';
        }

        function renderFinalScreen() {
          const visible = state.status === 'game_win' || state.status === 'game_lose';
          dom.final.classList.toggle('mot-final--visible', visible);
          if (!visible) return;
          const won = state.status === 'game_win';
          const progressPercent = percent(state.progressStep, state.stepsToFinish);
          const stepsLeft = Math.max(state.stepsToFinish - state.progressStep, 0);
          dom.final.classList.toggle('mot-final--win', won);
          dom.final.classList.toggle('mot-final--lose', !won);
          dom.finalCard.classList.toggle('mot-final__card--win', won);
          dom.finalCard.classList.toggle('mot-final__card--lose', !won);
          dom.finalEyebrow.textContent = won ? 'Финиш достигнут' : 'Раунд завершен';
          dom.finalTitle.textContent = won ? 'Победа!' : 'Попробуй еще раз';
          dom.finalSubtitle.textContent = won
            ? 'Ты дошел до финиша и удержал темп до самого конца.'
            : 'Жизни закончились раньше финиша, но раунд уже выглядит многообещающе.';
          dom.finalSummary.textContent = won
            ? `Точность ${state.accuracy}%, лучшая серия x${state.bestCombo}${state.perfectAnswers ? ` и ${state.perfectAnswers} идеальных попаданий` : ''}.`
            : `До финиша оставалось ${stepsLeft} шагов. Следующая попытка может быть еще сильнее.`;
          dom.finalScore.textContent = String(state.displayedScore);
          dom.finalCorrect.textContent = String(state.correctAnswers);
          dom.finalWrong.textContent = String(state.wrongAnswers);
          dom.finalProgress.textContent = `${state.progressStep} / ${state.stepsToFinish} шагов`;
          dom.finalProgressFill.style.width = `${progressPercent}%`;
          dom.finalAccuracy.textContent = `${state.accuracy}%`;
          dom.finalBestCombo.textContent = `x${state.bestCombo}`;
          dom.finalPerfect.textContent = String(state.perfectAnswers);
        }

        function renderStartScreen() {
          const visible = state.status === 'idle';
          dom.start.classList.toggle('mot-intro--visible', visible);
          if (!visible) return;
          dom.startLives.textContent = String(config.gameplay.lives);
          dom.startGoal.textContent = String(config.gameplay.stepsToFinish);
          dom.startQuestions.textContent = String(questions.length);
        }

        function setStatus(nextStatus) { state.status = nextStatus; render(); }

        function computeSelectedSegment() {
          const question = getCurrentQuestion();
          const totalSegments = question.answers.length;
          const width = 1 / totalSegments;
          const rawIndex = Math.floor(clamp(state.indicator.position, 0, 0.999999) / width);
          return clamp(rawIndex, 0, totalSegments - 1);
        }

        function isPerfectHit(question, selectedIndex) {
          if (!config.perfect.enabled) return false;
          if (selectedIndex !== question.correct_index) return false;
          const totalSegments = question.answers.length;
          const segmentWidth = 1 / totalSegments;
          const segmentStart = selectedIndex * segmentWidth;
          const center = segmentStart + segmentWidth / 2;
          const threshold = segmentWidth * Number(config.perfect.thresholdRatio || 0.12);
          return Math.abs(state.indicator.position - center) <= threshold;
        }

        function resetRoundState() {
          state.currentRound.selectedIndex = null;
          state.currentRound.correctIndex = null;
          state.currentRound.result = null;
          state.currentRound.bannerText = '';
          state.currentRound.hiddenIndices = [];
          state.currentRound.visibleIndices = [];
          state.currentRound.questionId = null;
          state.currentRound.isPerfect = false;
          state.currentRound.awardedScore = 0;
          state.currentRound.mode = 'normal';
          state.currentRound.stepGain = 1;
          state.currentRound.energyGain = 0;
        }

        function loadQuestion(index) {
          const question = questions[index];
          if (!question) return;
          resetRoundState();
          state.currentRound.questionId = question.id;
          state.currentRound.correctIndex = question.correct_index;
          state.currentRound.visibleIndices = question.answers.map((_, i) => i);
          state.currentRound.mode = question.mode || 'normal';
          state.indicator.position = 0;
          state.indicator.direction = 1;
          state.indicator.speed = Number(question.speed || config.movement.defaultSpeed || 300);
          state.indicator.movementType = config.movement.movementType || 'pingpong';
          state.currentRound.stopAvailableAt = performance.now() + Number(config.movement.minStopDelayMs || 800);
          emit('QUESTION_LOAD', { index, question });
          setStatus('question_ready');
        }

        function tick(ts) {
          if (!lastTs) lastTs = ts;
          const delta = (ts - lastTs) / 1000;
          lastTs = ts;
          if (state.status === 'indicator_moving' && !state.bonuses.freezeActive) {
            const railRect = dom.rail.getBoundingClientRect();
            const width = Math.max(railRect.width, 1);
            const speedPxPerSec = state.indicator.speed;
            const speedNorm = speedPxPerSec / width;
            let nextPos = state.indicator.position + speedNorm * delta * state.indicator.direction;
            if (state.indicator.movementType === 'pingpong') {
              if (nextPos >= 1) { nextPos = 1 - (nextPos - 1); state.indicator.direction = -1; }
              else if (nextPos <= 0) { nextPos = Math.abs(nextPos); state.indicator.direction = 1; }
            } else {
              if (nextPos >= 1) nextPos = nextPos - 1;
              if (nextPos < 0) nextPos = 1 + nextPos;
            }
            state.indicator.position = clamp(nextPos, 0, 1);
            renderIndicator();
            if (performance.now() >= state.currentRound.stopAvailableAt) dom.stopButton.disabled = false;
          }
          rafId = requestAnimationFrame(tick);
        }

        function startIndicator() {
          if (state.status !== 'idle' && state.status !== 'question_ready' && state.status !== 'transition_next') return;
          emit('INDICATOR_START', { questionIndex: state.currentQuestionIndex });
          setStatus('indicator_moving');
        }

        function useFreeze() {
          if (!(state.status === 'indicator_moving' && getBonusAvailable('freeze'))) return;
          spendEnergy(Number(config.bonuses.freezeCost || 100));
          state.bonuses.freezeActive = true;
          state.bonuses.freezeRemainingMs = Number(config.bonuses.freezeDurationMs || 10000);
          state.bonuses.freezeResumeStatus = 'indicator_moving';
          state.usedFreezeAnyTime = true;
          emit('BONUS_USE_FREEZE', { freezeDurationMs: state.bonuses.freezeRemainingMs });
          audio.freezeStart();
          render();
          const startedAt = Date.now();
          freezeInterval = setInterval(() => {
            const elapsed = Date.now() - startedAt;
            state.bonuses.freezeRemainingMs = Math.max(0, Number(config.bonuses.freezeDurationMs || 10000) - elapsed);
            render();
            if (state.bonuses.freezeRemainingMs <= 0) {
              clearInterval(freezeInterval);
              freezeInterval = null;
              state.bonuses.freezeActive = false;
              state.bonuses.freezeRemainingMs = 0;
              audio.freezeStop();
              render();
            }
          }, 100);
        }

        function useFifty() {
          if (!(state.status === 'indicator_moving' && getBonusAvailable('fifty'))) return;
          const question = getCurrentQuestion();
          const wrongIndices = question.answers.map((_, i) => i).filter((i) => i !== question.correct_index);
          if (wrongIndices.length <= 1) return;
          const keptWrongIndex = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
          const hide = wrongIndices.filter((i) => i !== keptWrongIndex).slice(0, 2);
          spendEnergy(Number(config.bonuses.fiftyCost || 60));
          state.currentRound.hiddenIndices = hide;
          emit('BONUS_USE_FIFTY', { hiddenIndices: hide, keptWrongIndex });
          audio.fifty();
          render();
        }

        function calculateRoundRewards(question, isCorrect, isPerfect) {
          let awardedScore = 0;
          let stepGain = 0;
          let energyGain = 0;
          if (!isCorrect) return { awardedScore, stepGain, energyGain };
          const comboMultiplier = Math.min(state.combo, Number(config.scoring.comboCap || 5)) * Number(config.scoring.comboStep || 50);
          awardedScore += Number(config.scoring.baseCorrect || 100) + comboMultiplier;
          energyGain += Number(config.bonuses.energyGainCorrect || 30);
          stepGain = 1;
          if (question.mode === 'speed') awardedScore = Math.round(awardedScore * Number(config.scoring.speedRoundMultiplier || 1.5));
          if (question.mode === 'boss') awardedScore = Math.round(awardedScore * Number(config.scoring.bossRoundMultiplier || 2));
          if (question.mode === 'double_step') {
            stepGain = 2;
            awardedScore += Number(config.scoring.doubleStepBonus || 50);
          }
          if (isPerfect) {
            awardedScore += Number(config.scoring.perfectBonus || 100);
            energyGain += Number(config.bonuses.energyGainPerfect || 20);
          }
          return { awardedScore, stepGain, energyGain };
        }

        function checkAnswer() {
          if (state.status !== 'indicator_stopped') return;
          const question = getCurrentQuestion();
          const isCorrect = state.currentRound.selectedIndex === question.correct_index;
          const perfectHit = isPerfectHit(question, state.currentRound.selectedIndex);
          state.currentRound.correctIndex = question.correct_index;
          state.currentRound.result = isCorrect ? 'correct' : 'wrong';
          state.currentRound.isPerfect = perfectHit;
          emit('ANSWER_CHECK', { selectedIndex: state.currentRound.selectedIndex, correctIndex: question.correct_index, isCorrect, perfectHit });

          if (isCorrect) {
            state.combo += 1;
            state.bestCombo = Math.max(state.bestCombo, state.combo);
            state.correctAnswers += 1;
            state.perfectStreak = perfectHit ? state.perfectStreak + 1 : 0;
            if (perfectHit) state.perfectAnswers += 1;
            const rewards = calculateRoundRewards(question, true, perfectHit);
            state.currentRound.awardedScore = rewards.awardedScore;
            state.currentRound.stepGain = rewards.stepGain;
            state.currentRound.energyGain = rewards.energyGain;
            state.progressStep += rewards.stepGain;
            state.score += rewards.awardedScore;
            gainEnergy(rewards.energyGain);
            state.currentRound.bannerText = perfectHit
              ? `${randomFrom(config.messages.perfect)} +${rewards.awardedScore}`
              : `${getComboMessage(state.combo) || randomFrom(config.messages.correct)} +${rewards.awardedScore}`;
            animateScoreTo(state.score, Number(config.gameplay.scoreCountDurationMs || 1200));
            if (perfectHit) {
              audio.perfect();
              triggerPerfectBurst();
              showToast('Идеал', `+${rewards.awardedScore} очков`, 'perfect');
            } else {
              audio.correct();
            }
            checkAchievementsOnCorrect();
            emit('ANSWER_CORRECT', { progressStep: state.progressStep, combo: state.combo, awardedScore: rewards.awardedScore });
          } else {
            const safeRound = question.mode === 'safe' && config.gameplay.safeRoundNoLifeLoss;
            if (!safeRound) state.lives -= 1;
            state.wrongAnswers += 1;
            state.combo = 0;
            state.perfectStreak = 0;
            state.currentRound.awardedScore = 0;
            state.currentRound.stepGain = 0;
            state.currentRound.energyGain = -Number(config.bonuses.energyLossWrong || 20);
            state.currentRound.bannerText = randomFrom(config.messages.wrong);
            gainEnergy(-Number(config.bonuses.energyLossWrong || 20));
            audio.wrong();
            triggerShake();
            emit('ANSWER_WRONG', { lives: state.lives, safeRound });
          }

          updateAccuracy();
          setStatus('showing_result');

          if (state.progressStep >= state.stepsToFinish) {
            roundTimeout = setTimeout(() => {
              checkAchievementsOnWin();
              emit('GAME_WIN', { state: getPublicState() });
              setStatus('game_win');
              spawnConfetti(100);
            }, 1100);
            return;
          }
          if (state.lives <= 0) {
            roundTimeout = setTimeout(() => {
              emit('GAME_LOSE', { state: getPublicState() });
              setStatus('game_lose');
            }, 1100);
            return;
          }
          roundTimeout = setTimeout(() => nextQuestion(), Number(config.ui.autoNextDelayMs || 1700));
        }

          emit('INDICATOR_STOP', { indicatorPosition: state.indicator.position, selectedIndex: state.currentRound.selectedIndex });
